<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>work tools</title>
<style>
:root{
  --black:#050505;
  --panel:#111111;
  --panelHover:#181818;
  --white:#ffffff;
  --yellow:#ffd84d;
  --mustard:#c99a24;
  --border:#4b3a16;
  --muted:#cfcfcf;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:var(--black);
  color:var(--white);
  font-family:"Century Gothic",Arial,sans-serif;
}
header{
  padding:38px 20px 18px;
  text-align:center;
}
header h1{
  margin:0;
  color:var(--mustard);
  font-size:2rem;
}
main{
  width:92%;
  max-width:950px;
  margin:15px auto 45px;
}
.tool-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:16px;
}
.tool-card{
  min-height:165px;
  padding:24px 18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  color:var(--white);
  box-shadow:0 4px 12px rgba(0,0,0,.5);
  cursor:pointer;
  transition:transform .2s ease,background .2s ease,border-color .2s ease,box-shadow .2s ease;
}
.tool-card:hover,
.tool-card:focus{
  transform:translateY(-4px);
  background:var(--panelHover);
  border-color:var(--mustard);
  box-shadow:0 8px 18px rgba(0,0,0,.65);
  outline:none;
}
.tool-card:active{
  transform:translateY(-1px);
}
.tool-icon{
  margin-bottom:10px;
  color:var(--mustard);
  font-size:2.2rem;
  line-height:1;
}
.tool-card h2{
  margin:0;
  color:var(--yellow);
  font-size:1.15rem;
}
footer{
  padding:18px;
  color:var(--muted);
  text-align:center;
  font-size:.8rem;
}
@media(max-width:550px){
  header{padding-top:28px}
  header h1{font-size:1.65rem}
  .tool-card{min-height:150px}
}
</style>
</head>
<body>

<header>
  <h1>work tools</h1>
</header>

<main>
  <section class="tool-grid">

    <a class="tool-card" href="https://drpboop.github.io/crit/" aria-label="open critter">
      <div class="tool-icon">✎</div>
      <h2>critter</h2>
    </a>

    <a class="tool-card" href="https://drpboop.github.io/refill-lookback/" aria-label="open refill lookback">
      <div class="tool-icon">▦</div>
      <h2>refill lookback</h2>
    </a>

    <a class="tool-card" href="https://drpboop.github.io/situational/" aria-label="open situational">
      <div class="tool-icon">✦</div>
      <h2>situational</h2>
    </a>

    <a class="tool-card" href="https://drpboop.github.io/status-log/" aria-label="open status log">
      <div class="tool-icon">◷</div>
      <h2>status log</h2>
    </a>

  </section>
</main>

<footer>work tools</footer>

</body>
</html>
